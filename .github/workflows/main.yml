name: Build YouProEXTRA IPA
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      demc:
        description: "Integrate DontEatMyContent"
        default: true
        required: false
        type: boolean

      ytvid:
        description: "Integrate YTVideoErrorAlert"
        default: true
        required: false
        type: boolean

      isponsorblock:
        description: "Integrate iSponsorBlock"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YouPro+YouMod IPA with iSponsorBlock
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Hide Sensitive Inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,demc,ytvid,isponsorblock

      - name: Download and Validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --quiet --no-verbose -O youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Get YouTube Version
        run: |
          unzip -q youtube.ipa -d ytextracted
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' ytextracted/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> $GITHUB_ENV

      - name: Install Dependencies
        run: brew install make ldid swiftlint dpkg

      - name: Set PATH Environment Variables
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: ${{ github.workspace }}/theos
          submodules: recursive

      # IMPORTANT: ensure THEOS points to a writable directory in the runner.
      # If THEOS is unset, "$THEOS/sdks" becomes "/sdks" which is read-only on GitHub runners.
      - name: Export THEOS path
        run: echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          git clone --quiet --depth=1 https://github.com/theos/sdks.git
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mkdir -p "$THEOS/sdks"
          mv iPhoneOS16.5.sdk "$THEOS/sdks/"

      - name: Install cyan and tbd
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          wget --quiet --no-verbose "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd
          chmod +x /usr/local/bin/tbd

      - name: Clone Open in YouTube (Safari Extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension.git
          cd OpenYouTubeSafariExtension
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Clone YouTubeHeader
        run: |
          if [ ! -d "$THEOS/include/YouTubeHeader" ]; then
            git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git $THEOS/include/YouTubeHeader
          fi
          if [ "${{ inputs.demc }}" = "true" ] && [ ! -d "$THEOS/include/YTHeaders" ]; then
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi

      - name: Clone PSHeader
        run: |
          if [ ! -d "$THEOS/include/PSHeader" ]; then
            git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git $THEOS/include/PSHeader
          fi

      - name: Clone YTVideoOverlay
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Install libundirect
        run: |
          git clone --quiet --depth=1 https://github.com/opa334/libundirect.git
          mkdir -p $THEOS/include/libundirect
          cp libundirect/libundirect_dynamic.h $THEOS/include/libundirect/
          cp libundirect/libundirect.h $THEOS/include/libundirect/

      # NOTE:
      # Your attached workflow referenced steps.cache_tweaks.* in multiple `if:` conditions,
      # but the cache step is not present in the file. That makes the workflow fail at runtime.
      # This version removes those `if:` gates so the workflow is self-contained.

      - name: Build YTVideoOverlay
        run: |
          cd YTVideoOverlay && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb

      - name: Clone and Build YouPro
        run: |
          git clone --quiet --depth=1 https://github.com/mrdrvt99/YouPro.git
          cd YouPro
          echo "YOUPRO_VERSION=$(grep '^Version:' DEBIAN/control | awk '{print $2}')" >> $GITHUB_ENV
          chmod -R 755 .
          dpkg-deb --root-owner-group -Zgzip --build . ../YouPro.deb
          mv ../YouPro.deb ${{ github.workspace }}/YouPro.deb

      - name: Clone and Build YouPiP
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git
          cd YouPiP && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youpip.deb

      - name: Clone and Build YTUHD
        run: |
          git clone --quiet --depth=1 https://github.com/Tonwalter888/YTUHD.git
          cd YTUHD && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless SIDELOAD=1
          mv packages/*.deb ${{ github.workspace }}/ytuhd.deb

      - name: Clone and Build Return-YouTube-Dislikes
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git
          cd Return-YouTube-Dislikes && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ryd.deb

      - name: Clone and Build YouGroupSettings
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git
          cd YouGroupSettings && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygs.deb

      - name: Clone and Build YTABConfig
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git
          cd YTABConfig && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytabconfig.deb

      - name: Clone and Build YouQuality
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git
          cd YouQuality && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youquality.deb

      - name: Clone and Build YouSpeed
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouSpeed.git
          cd YouSpeed && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youspeed.deb

      - name: Clone and Build YouMute
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouMute.git
          cd YouMute && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ym.deb

      - name: Clone and Build YouLoop
        run: |
          git clone --quiet --depth=1 https://github.com/bhackel/YouLoop.git
          cd YouLoop && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youloop.deb

      - name: Clone and Build Alderis
        run: |
          git clone --quiet --depth=1 https://github.com/hbang/Alderis.git
          # Fix for: ld: framework 'Preferences' not found
          # Alderis/libcolorpicker requires TARGET to match the installed SDK version.
          cd Alderis && make clean package DEBUG=0 FINALPACKAGE=1 ARCHS=arm64 TARGET=iphone:clang:16.5
          mv packages/*.deb ${{ github.workspace }}/alderis.deb

      - name: Clone and Build YouSlider
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouSlider.git
          cd YouSlider && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youslider.deb

      - name: Clone and Build YouChooseQuality
        run: |
          git clone --quiet https://github.com/PoomSmart/YouChooseQuality.git
          cd YouChooseQuality
          git checkout 1585a3691b2ef0b59d42c40c31639fd8b79e2cd4
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youchoose.deb

      - name: Clone and Build YTSilentVote
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTSilentVote.git
          cd YTSilentVote && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytnovote.deb

      - name: Clone and Build YouShare
        run: |
          git clone --quiet --depth=1 https://github.com/Tonwalter888/YouShare.git
          cd YouShare && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youshare.deb

      - name: Clone and Build Gonerino
        run: |
          git clone --quiet --depth=1 https://github.com/castdrian/Gonerino.git
          cd Gonerino && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/gonerino.deb

      - name: Clone and Build YTweaks
        run: |
          git clone --quiet --depth=1 https://github.com/fosterbarnes/YTweaks.git
          cd YTweaks && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytweaks.deb

      - name: Clone and Build YouGetCaption
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouGetCaption.git
          cd YouGetCaption && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygc.deb

      - name: Clone and Build YTFlags
        run: |
          git clone --quiet --depth=1 https://github.com/Tonwalter888/YTFlags.git
          cd YTFlags && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytflags.deb

      - name: Clone and Build IAmYouTube
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/IAmYouTube.git
          cd IAmYouTube && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/imyt.deb

      - name: Clone and Build DontEatMyContent
        if: inputs.demc == true
        run: |
          git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git
          cd DontEatMyContent && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/demc.deb

      - name: Clone and Build iSponsorBlock
        if: inputs.isponsorblock == true
        run: |
          git clone --quiet --depth=1 https://github.com/Galactic-Dev/iSponsorBlock.git
          cd iSponsorBlock && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless TARGET=iphone:clang:latest:13.0
          mv packages/*.deb ${{ github.workspace }}/isponsorblock.deb

      - name: Clone and Build YTVideoErrorAlert
        if: inputs.ytvid == true
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoErrorAlert.git
          cd YTVideoErrorAlert && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvideoerror.deb

      - name: Inject Tweaks Into IPA
        run: |
          tweaks="OpenYouTubeSafariExtension.appex"
          for f in *.deb; do
            [ -f "$f" ] && tweaks="$tweaks $f"
          done
          cyan -i youtube.ipa -o YouProEXTRA_${{ env.YT_VERSION }}.ipa -uwef $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Create a Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: youproextra-ipa${{ github.run_number }}
          name: YouProEXTRA_${{ env.YT_VERSION }}_(${{ github.run_number }})
          files: YouProEXTRA_${{ env.YT_VERSION }}.ipa
          draft: true

      - name: Job Summary - Build Complete
        run: echo -e '### 🛠️ Build YouProEXTRA IPA Complete!' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Output the Draft Release Link
        run: |
          echo -e "### 🚀 Draft Release\n\nDraft release has been created successfully! You can view your release here: https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Cleanup
        run: |
          echo -e "### 🧹 Cleanup\n\nYou can remove previous GitHub Actions run here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-workflows-run.yml And if you want to delete old draft releases you have then here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-draft-releases.yml" >> $GITHUB_STEP_SUMMARY
